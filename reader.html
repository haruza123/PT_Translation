<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reader — PT Prajurit Translation" />
    <title>Reader — PT Prajurit Translation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/analytics.js" defer></script>
  </head>
  <body data-page="reader">
    <a class="skip-link" href="#main">Langsung ke konten</a>

    <header class="site-header" data-elevate>
      <div class="container nav">
        <a class="brand" href="index.html#home" aria-label="PT Prajurit Translation">
          <span class="brand__mark" aria-hidden="true">PT</span>
          <span class="brand__text">Prajurit Translation</span>
        </a>

        <button
          class="nav__toggle"
          type="button"
          aria-label="Buka menu"
          aria-expanded="false"
          aria-controls="nav-menu"
          data-nav-toggle
        >
          <span class="nav__toggle-bar" aria-hidden="true"></span>
          <span class="nav__toggle-bar" aria-hidden="true"></span>
        </button>

        <nav class="nav__menu" id="nav-menu" aria-label="Utama" data-nav-menu>
          <a class="nav__link" href="index.html#home">Home</a>
          <a class="nav__link" href="index.html#manga">Manga</a>
          <a class="nav__link" href="translator.html">Translator</a>
          <a class="nav__link" href="genre.html">Genre</a>
          <a class="nav__link" href="series.html">Series</a>
        </nav>

        <div class="nav__search" data-search-wrap>
          <label class="visually-hidden" for="global-search">Cari manga</label>
          <input
            id="global-search"
            class="input input--search"
            type="search"
            placeholder="Cari manga…"
            autocomplete="off"
            spellcheck="false"
            data-global-search
          />
          <div class="suggest" id="search-suggest" role="listbox" aria-label="Saran pencarian"></div>
        </div>
      </div>
    </header>

    <main id="main" class="reader">
      <section class="reader__head">
        <div class="container reader__head-inner">
          <a class="back" href="index.html#manga" id="reader-back">← Kembali</a>

          <div class="reader__head-row">
            <div>
              <h1 class="reader__title" id="reader-title">Reader</h1>
              <p class="reader__meta" id="reader-meta"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="container reader__pages" id="reader-pages" aria-label="Halaman manga"></section>

      <!-- Floating Reader Bar -->
      <div class="reader-bar" id="reader-bar">
        <div class="container reader-bar__inner">
          <a class="btn btn--chip" href="#" id="bar-back">← Kembali</a>
          
          <div class="reader-bar__controls">
            <label class="visually-hidden" for="bar-chapter">Pilih chapter</label>
            <select class="select" id="bar-chapter"></select>
            <div class="reader-bar__counter" id="bar-counter">1 / 1</div>
            <div style="position: relative;">
              <button class="btn btn--chip" type="button" id="btn-reader-settings" aria-label="Pengaturan" style="padding: 0 10px; font-size: 1.2rem; background: transparent; border: none;">⚙️</button>
              <div class="settings-modal" id="reader-settings-modal">
                <div class="settings-group">
                  <label for="setting-direction">Arah Baca</label>
                  <select class="select" id="setting-direction">
                    <option value="vertical">Vertikal (Scroll)</option>
                    <option value="horizontal">Horizontal (Geser)</option>
                  </select>
                </div>
                <div class="settings-group">
                  <label for="setting-fit">Ukuran Halaman</label>
                  <select class="select" id="setting-fit">
                    <option value="width">Lebar Penuh (Fit Width)</option>
                    <option value="height">Tinggi Penuh (Fit Height)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p class="footer__copy">© <span id="year"></span> PT Prajurit Translation</p>
        <p class="footer__meta">Multi-translator platform • Vanilla HTML/CSS/JS</p>
      </div>
    </footer>

    <script src="js/security.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/detail.js" defer></script>
  </body>
</html>
